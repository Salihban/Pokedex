<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/pokeball.png">

    <script defer src="./script/template.js"></script>
    <script defer src="./script/object.js"></script>
    <script defer src="./script/spinner.js"></script>
    <script defer src="./main.js"></script>
    <script defer src="./script/search.js"></script>
    <script defer src="./script/dialog.js"></script>
    

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="headerline">
            <img src="./assets/img/pokeball.png" alt="Pokeball Bild">
            <h1>Pokedex</h1>
        </div>
        <div class="inputfield">
            <input data-id="search-inout" id="search-input" oninput="searchPokemon()" type="text" placeholder="Search Pokemon . . .">
            </div>
    </header>
    <main data-id="content" id="content"></main>
    <dialog data-id="dialog" id="dialog" ></dialog>
    <div class="Loard-more-btn-wrapper">
        <button data-input="load-more-button" onclick="loadPokemon()">Load More</button>
    </div>
    <div id="loading-spinner" class="spinner-container d-none">
        <div class="spinner"></div>
    </div>
    <footer>
        <div class="footerline">
        <img src="./assets/img/pokeball.png" alt="">
        <p>&copy; Pokedex 2026</p>
        </div>
    </footer>
</body>
</html>
