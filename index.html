<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/pokeball.png">

    <script src="./script/template.js"></script>
    <script src="./script/object.js"></script>
    <script src="./main.js"></script>
    <script src="./script/search.js"></script>
    <script src="./script/spinner.js"></script>
    <script src="./script/dialog.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="headerline">
            <img src="./assets/img/pokeball.png" alt="Pokeball Bild">
            <h1>Pokedex</h1>
            <input id="search-input" oninput="searchPokemon()" type="text" placeholder="Search Pokemon . . .">
        </div>
    </header>
    <main id="content"></main>
    <dialog id="dialog"></dialog>
    <div class="Loard-more-btn-wrapper">
        <button onclick="loadPokemon()">Load More</button>
    </div>
    <footer>
        <div class="footerline">
        <img src="./assets/img/pokeball.png" alt="">
        <p>&copy; Pokedex 2026</p>
        </div>
        </footer>
</body>
</html>
